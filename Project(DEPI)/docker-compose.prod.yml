services:
  app:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_NAME:-bookifyhotel}:${DOCKER_IMAGE_TAG:-latest}
    pull_policy: always
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1G
        reservations:
          cpus: "0.50"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_gcServer: "1"
      DOTNET_ThreadPool_MinThreads: "16"

  mssql:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 3G
        reservations:
          cpus: "0.75"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
